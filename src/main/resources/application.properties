#spring.profiles.active=product

#テスト用 テストを行う際は下記コメントを外す
spring.profiles.active=test

jakarta.validator.constraints.NotBlank.message={0}を入力してください。
jakarta.validation.constraints.NotNull.message={0}を入力してください。
jakarta.validation.constraints.Size.message={0}は{max}文字以で入力してください。
jakarta.validation.constraints.Max.message={0}は整数値で入力してください。
typeMismatch.java.lang.Integer={0}は整数値で入力してください。
typeMismatch.java.util.Date=正しい日付を入力してください。